# Mintreu BG Remover - Configuration File
# =========================================
# This file contains all configurable settings for the application
# Edit this file to customize URLs, timeouts, and other settings

[UPDATE]
# Update check URL - Main endpoint
update_check_url = https://mintreu.com/api/bg-remover/version.json

# Fallback URLs - Tried if main URL fails (comma-separated)
fallback_urls = https://updates.mintreu.com/bg-remover/version.json,https://cdn.mintreu.com/bg-remover/version.json

# Update check timeout in seconds
update_check_timeout = 10

# Download timeout in seconds
download_timeout = 300

# Enable automatic update checking on startup (true/false)
auto_check_updates = true

# Check for updates in background (non-blocking) (true/false)
background_update_check = true

[DOWNLOAD]
# Base URL for downloads
download_base_url = https://mintreu.com/downloads/bg-remover

# Download folder for portable updates (leave empty for default Downloads folder)
download_folder =

[APPLICATION]
# Application name
app_name = Mintreu BG Remover

# Company name
company_name = Mintreu

# Company website
company_website = https://mintreu.com

# Support email
support_email = contact@mintreu.com

# Support website
support_url = https://mintreu.com/support

[MODELS]
# Model download base URL
model_base_url = https://huggingface.co

# Enable auto-download of models on first run (true/false)
auto_download_models = true

[LOGGING]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

# Enable file logging (true/false)
enable_file_logging = true

# Log file location (leave empty for default: %USERPROFILE%\.mintreu_bg_remover\app.log)
log_file =

[ADVANCED]
# Number of worker threads (0 = auto-detect based on CPU cores)
default_workers = 0

# Enable GPU acceleration if available (true/false) [Future feature]
enable_gpu = false

# Cache directory (leave empty for default)
cache_directory =

# Output directory (leave empty for default: ./output)
output_directory =
